name: Module Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  issue_comment:
    types: [created]

# Prevent concurrent runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ===== CUSTOMIZE THESE FOR YOUR PROJECT =====
  AWS_ROLE_ARN: "arn:aws:iam::078963965848:role/joaoj-eks-test-pipeline"
  AWS_REGION: "us-west-1"
  PROJECT_NAME: "eks-cluster"
  # ===== END CUSTOMIZATION =====
  TERRAFORM_VERSION: "1.6.6"
  GO_VERSION: "1.21"
  TFLINT_VERSION: "v0.50.3"
  MIN_EKS_VERSION: "1.31"

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:
  #############################################################################
  # Stage 1: Static Analysis (parallel)
  #############################################################################
  terraform-fmt:
    name: Terraform Format
    if: github.event_name != 'issue_comment' || contains(github.event.comment.body, '/test-all')
    runs-on: ubuntu-latest
    steps:
      - name: React to /test-all comment
        if: github.event_name == 'issue_comment'
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=rocket
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout PR branch
        if: github.event_name == 'issue_comment'
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: Checkout
        if: github.event_name != 'issue_comment'
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Format Check
        run: task fmt

  terraform-validate:
    name: Terraform Validate
    if: github.event_name != 'issue_comment' || contains(github.event.comment.body, '/test-all')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        if: github.event_name == 'issue_comment'
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: Checkout
        if: github.event_name != 'issue_comment'
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Validate
        run: task validate-tf

  tflint:
    name: TFLint
    if: github.event_name != 'issue_comment' || contains(github.event.comment.body, '/test-all')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        if: github.event_name == 'issue_comment'
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: Checkout
        if: github.event_name != 'issue_comment'
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Run TFLint
        run: task tflint

  trivy:
    name: Trivy Security Scan
    if: github.event_name != 'issue_comment' || contains(github.event.comment.body, '/test-all')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      checks: write

    steps:
      - name: Checkout PR branch
        if: github.event_name == 'issue_comment'
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: Checkout
        if: github.event_name != 'issue_comment'
        uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy IaC scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM'
          trivyignores: .trivyignore

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  #############################################################################
  # Stage 2: Unit Tests
  #############################################################################

  tests-unit:
    name: Unit Tests
    if: github.event_name != 'issue_comment' || contains(github.event.comment.body, '/test-all')
    runs-on: ubuntu-latest
    needs: [terraform-fmt, terraform-validate, tflint, trivy]
    steps:
      - name: Checkout PR branch
        if: github.event_name == 'issue_comment'
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: Checkout
        if: github.event_name != 'issue_comment'
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: test/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests
        run: task test-unit

  #############################################################################
  # Stage 3: Integration Tests
  # Go tests handle the full lifecycle: VPC deploy, version discovery,
  # parallel EKS deploys, validation, and all cleanup via defer.
  #############################################################################

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [tests-unit]
    if: |
      always()
      && (needs.tests-unit.result == 'success' || needs.tests-unit.result == 'skipped')
      && (
        (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/test-integration'))
        || (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/test-all'))
      )
    timeout-minutes: 60
    outputs:
      test_results: ${{ steps.parse-results.outputs.results }}
    env:
      PIPELINE_RUN_ID: "${{ github.run_id }}"
    steps:
      - name: React to comment
        if: github.event_name == 'issue_comment'
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=rocket
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve PR head SHA
        id: pr-sha
        if: github.event_name == 'issue_comment'
        run: |
          SHA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefOid -q .headRefOid)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set PR commit status (pending)
        if: steps.pr-sha.outputs.sha
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ steps.pr-sha.outputs.sha }}
          status: pending
          context: Integration Tests
          description: Integration tests running...

      - name: Checkout PR branch
        if: github.event_name == 'issue_comment'
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: Checkout
        if: github.event_name != 'issue_comment'
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: terratest-integration-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: test/go.sum

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        id: run-tests
        run: |
          set -o pipefail
          task test-integration 2>&1 | tee /tmp/test-output.log
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          MIN_EKS_VERSION: ${{ env.MIN_EKS_VERSION }}
          PROJECT_NAME: ${{ env.PROJECT_NAME }}

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_id }}
          path: test/*.log
          retention-days: 7

      - name: Parse test results
        id: parse-results
        if: always() && steps.run-tests.outcome != 'skipped'
        run: |
          if [[ ! -f /tmp/test-output.log ]]; then
            echo "results=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RESULTS=""
          while IFS= read -r line; do
            if [[ "$line" =~ ---\ (PASS|FAIL):.*versions/EKS_([0-9_]+) ]]; then
              status="${BASH_REMATCH[1]}"
              version="${BASH_REMATCH[2]//_/.}"
              duration=""
              if [[ "$line" =~ \(([0-9.]+)s\) ]]; then
                duration="${BASH_REMATCH[1]}s"
              fi
              RESULTS="${RESULTS}${status}|${version}|${duration}\n"
            fi
          done < /tmp/test-output.log
          {
            echo 'results<<EOF'
            echo -e "$RESULTS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set PR commit status (result)
        if: always() && steps.pr-sha.outputs.sha
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ steps.pr-sha.outputs.sha }}
          status: ${{ job.status }}
          context: Integration Tests

  #############################################################################
  # Stage 4: Fallback Cleanup (cloud-nuke safety net)
  #############################################################################

  cleanup-fallback:
    name: Cleanup AWS Resources (cloud-nuke)
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: always() && needs.integration-test.result != 'skipped'
    outputs:
      cleanup_summary: ${{ steps.parse-cleanup.outputs.summary }}
    steps:
      - name: Resolve PR head SHA
        id: pr-sha
        if: github.event_name == 'issue_comment'
        run: |
          SHA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefOid -q .headRefOid)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set PR commit status (pending)
        if: steps.pr-sha.outputs.sha
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ steps.pr-sha.outputs.sha }}
          status: pending
          context: Cleanup (cloud-nuke)
          description: Cleanup running...

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: terratest-cleanup-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cleanup
        id: run-cleanup
        run: |
          set -o pipefail
          task cleanup-run 2>&1 | tee /tmp/cleanup-output.log || true
        env:
          PIPELINE_RUN_ID: "${{ github.run_id }}"
          CLOUD_NUKE_VERSION: v0.46.0
          DISABLE_TELEMETRY: "true"

      - name: Parse cleanup results
        id: parse-cleanup
        if: always()
        run: |
          if [[ -f /tmp/cleanup-output.log ]]; then
            SUMMARY=$(tail -20 /tmp/cleanup-output.log)
          else
            SUMMARY="No cleanup output captured"
          fi
          {
            echo 'summary<<EOF'
            echo "$SUMMARY"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set PR commit status (result)
        if: always() && steps.pr-sha.outputs.sha
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ steps.pr-sha.outputs.sha }}
          status: ${{ job.status }}
          context: Cleanup (cloud-nuke)

  #############################################################################
  # Summary job
  #############################################################################

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs:
      - terraform-fmt
      - terraform-validate
      - tflint
      - trivy
      - tests-unit
      - integration-test
      - cleanup-fallback
    if: always()
    steps:
      - name: Generate summary report
        id: report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_RESULTS: ${{ needs.integration-test.outputs.test_results }}
          CLEANUP_SUMMARY: ${{ needs.cleanup-fallback.outputs.cleanup_summary }}
        run: |
          # ── Helpers ──────────────────────────────────────────────────────
          status_icon() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              skipped)   echo "⏭️" ;;
              cancelled) echo "🚫" ;;
              *)         echo "❓" ;;
            esac
          }

          # ── Job results ──────────────────────────────────────────────────
          FMT="${{ needs.terraform-fmt.result }}"
          VALIDATE="${{ needs.terraform-validate.result }}"
          TFLINT="${{ needs.tflint.result }}"
          TRIVY="${{ needs.trivy.result }}"
          UNIT="${{ needs.tests-unit.result }}"
          INTEGRATION="${{ needs.integration-test.result }}"
          CLEANUP="${{ needs.cleanup-fallback.result }}"

          EVENT="${{ github.event_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          # ── Build report ─────────────────────────────────────────────────
          REPORT=$(mktemp)
          {
            echo "## Pipeline Results"
            echo ""
            echo "**Commit:** \`${SHORT_SHA}\` · **Branch:** \`${{ github.ref_name }}\` · **Actor:** @${{ github.actor }} · [View run →](${RUN_URL})"
            echo ""

            # Trigger context
            COMMENT_BODY="${{ github.event.comment.body }}"
            if [[ "$EVENT" == "issue_comment" && "$COMMENT_BODY" == *"/test-all"* ]]; then
              echo "> Triggered by \`/test-all\` comment — full pipeline"
            elif [[ "$EVENT" == "issue_comment" ]]; then
              echo "> Triggered by \`/test-integration\` comment — static analysis and unit tests skipped"
            elif [[ "$EVENT" == "push" ]]; then
              echo "> Triggered by push to \`${{ github.ref_name }}\`"
            else
              echo "> Triggered by pull request"
            fi
            echo ""

            # ── Static Analysis ──────────────────────────────────────────
            echo "### Static Analysis"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Terraform Format | $(status_icon $FMT) $FMT |"
            echo "| Terraform Validate | $(status_icon $VALIDATE) $VALIDATE |"
            echo "| TFLint | $(status_icon $TFLINT) $TFLINT |"
            echo "| Trivy Security Scan | $(status_icon $TRIVY) $TRIVY |"
            echo ""

            # ── Tests ────────────────────────────────────────────────────
            echo "### Tests"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Unit Tests | $(status_icon $UNIT) $UNIT |"
            echo "| Integration Tests | $(status_icon $INTEGRATION) $INTEGRATION |"
            echo ""

            # Integration test breakdown (collapsible)
            if [[ -n "$TEST_RESULTS" && "$INTEGRATION" != "skipped" ]]; then
              echo "<details>"
              echo "<summary>📋 EKS Version Breakdown</summary>"
              echo ""
              echo "| Version | Result | Duration |"
              echo "|---------|--------|----------|"
              while IFS='|' read -r result version duration; do
                [[ -z "$result" ]] && continue
                if [[ "$result" == "PASS" ]]; then
                  icon="✅"
                else
                  icon="❌"
                fi
                echo "| ${version} | ${icon} ${result} | ${duration} |"
              done <<< "$TEST_RESULTS"
              echo ""
              echo "</details>"
              echo ""
            fi

            # Artifact notice
            if [[ "$INTEGRATION" == "failure" ]]; then
              echo "> 📎 **Test logs uploaded** — check the [Artifacts tab](${RUN_URL}#artifacts) in this workflow run"
              echo ""
            fi

            # ── Cleanup ──────────────────────────────────────────────────
            if [[ "$CLEANUP" != "skipped" ]]; then
              echo "### Cleanup"
              echo ""
              echo "| Job | Result |"
              echo "|-----|--------|"
              echo "| cloud-nuke | $(status_icon $CLEANUP) $CLEANUP |"
              echo ""

              if [[ -n "$CLEANUP_SUMMARY" ]]; then
                echo "<details>"
                echo "<summary>🧹 Cleanup Details</summary>"
                echo ""
                echo '```'
                echo "$CLEANUP_SUMMARY"
                echo '```'
                echo ""
                echo "</details>"
                echo ""
              fi
            fi

            # ── Verdict ──────────────────────────────────────────────────
            FAILED=false
            if [[ "$FMT" == "failure" ]] || \
               [[ "$VALIDATE" == "failure" ]] || \
               [[ "$TFLINT" == "failure" ]] || \
               [[ "$TRIVY" == "failure" ]] || \
               [[ "$UNIT" == "failure" ]]; then
              echo "> **❌ One or more required jobs failed** — [view logs](${RUN_URL})"
              FAILED=true
            elif [[ "$INTEGRATION" == "failure" ]]; then
              echo "> **❌ Integration tests failed** — [view logs](${RUN_URL})"
              FAILED=true
            else
              echo "> **✅ All required checks passed**"
            fi
          } > "$REPORT"

          # Write to both step summary and file for PR comment
          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          cp "$REPORT" /tmp/summary-report.md

          # Exit with failure if any required job failed
          if [[ "$FAILED" == "true" ]]; then
            exit 1
          fi

      - name: Post summary to PR
        if: >-
          always() &&
          (github.event_name == 'pull_request' || github.event_name == 'issue_comment')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine PR number
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            PR_NUMBER="${{ github.event.issue.number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          [[ -z "$PR_NUMBER" ]] && { echo "No PR number found, skipping comment"; exit 0; }

          # Prepare comment body with marker for idempotent updates
          MARKER="<!-- pipeline-summary -->"
          {
            echo "$MARKER"
            cat /tmp/summary-report.md
          } > /tmp/pr-comment.md

          # Find existing pipeline summary comment to update (avoid duplicates)
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" 2>/dev/null | head -1)

          if [[ -n "$EXISTING" ]]; then
            # Update existing comment via API with JSON body
            jq -n --rawfile body /tmp/pr-comment.md '{"body": $body}' | \
              gh api "repos/${{ github.repository }}/issues/comments/${EXISTING}" \
                -X PATCH --input -
            echo "Updated existing PR comment ${EXISTING}"
          else
            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body-file /tmp/pr-comment.md
            echo "Posted new PR comment"
          fi
