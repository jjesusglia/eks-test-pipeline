name: Module Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

# Prevent concurrent runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ===== CUSTOMIZE THESE FOR YOUR PROJECT =====
  AWS_ROLE_ARN: "arn:aws:iam::078963965848:role/joaoj-eks-test-pipeline"
  AWS_REGION: "us-west-1"
  PROJECT_NAME: "eks-cluster"
  # ===== END CUSTOMIZATION =====
  TERRAFORM_VERSION: "1.6.6"
  GO_VERSION: "1.21"
  TFLINT_VERSION: "v0.50.3"
  MIN_EKS_VERSION: "1.31"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  #############################################################################
  # Stage 1: Static Analysis (parallel)
  #############################################################################
  terraform-fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Format Check
        run: task fmt

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Validate
        run: task validate-tf

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        run: task tflint

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy IaC scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM'
          trivyignores: .trivyignore

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  #############################################################################
  # Stage 2: Unit Tests
  #############################################################################

  tests-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [terraform-fmt, terraform-validate, tflint, trivy]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: test/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests
        run: task test

  #############################################################################
  # Stage 3: Integration Tests
  # Go tests handle the full lifecycle: VPC deploy, version discovery,
  # parallel EKS deploys, validation, and all cleanup via defer.
  #############################################################################

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [tests-unit]
    if: github.ref == 'refs/heads/master' || contains(github.event.pull_request.labels.*.name, 'run-integration-tests')
    timeout-minutes: 60
    env:
      PIPELINE_RUN_ID: "${{ github.run_id }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: terratest-integration-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: test/go.sum

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        run: task test-integration
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          MIN_EKS_VERSION: ${{ env.MIN_EKS_VERSION }}
          PROJECT_NAME: ${{ env.PROJECT_NAME }}

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_id }}
          path: test/*.log
          retention-days: 7

  #############################################################################
  # Stage 4: Fallback Cleanup (cloud-nuke safety net)
  #############################################################################

  cleanup-fallback:
    name: Cleanup AWS Resources (cloud-nuke)
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: always() && needs.integration-test.result != 'skipped'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: terratest-cleanup-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cleanup
        run: task cleanup-run -- force
        env:
          PIPELINE_RUN_ID: "${{ github.run_id }}"
          CLOUD_NUKE_VERSION: v0.46.0
          DISABLE_TELEMETRY: "true"

  #############################################################################
  # Summary job
  #############################################################################

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs:
      - terraform-fmt
      - terraform-validate
      - tflint
      - trivy
      - tests-unit
      - integration-test
      - cleanup-fallback
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "Static Analysis Results:"
          echo "  - terraform-fmt: ${{ needs.terraform-fmt.result }}"
          echo "  - terraform-validate: ${{ needs.terraform-validate.result }}"
          echo "  - tflint: ${{ needs.tflint.result }}"
          echo "  - trivy: ${{ needs.trivy.result }}"
          echo ""
          echo "Test Results:"
          echo "  - tests-unit: ${{ needs.tests-unit.result }}"
          echo "  - integration-test: ${{ needs.integration-test.result }}"
          echo ""
          echo "Cleanup Results:"
          echo "  - cleanup-fallback: ${{ needs.cleanup-fallback.result }}"

          # Fail if any required static analysis or unit test job failed
          if [[ "${{ needs.terraform-fmt.result }}" == "failure" ]] || \
             [[ "${{ needs.terraform-validate.result }}" == "failure" ]] || \
             [[ "${{ needs.tflint.result }}" == "failure" ]] || \
             [[ "${{ needs.trivy.result }}" == "failure" ]] || \
             [[ "${{ needs.tests-unit.result }}" == "failure" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi

          # Fail if integration tests failed
          if [[ "${{ needs.integration-test.result }}" == "failure" ]]; then
            echo "Integration tests failed"
            exit 1
          fi

          echo "All required checks passed!"
