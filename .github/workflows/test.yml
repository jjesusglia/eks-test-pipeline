name: Module Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  issue_comment:
    types: [created]

# Prevent concurrent runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ===== CUSTOMIZE THESE FOR YOUR PROJECT =====
  AWS_ROLE_ARN: "arn:aws:iam::078963965848:role/joaoj-eks-test-pipeline"
  AWS_REGION: "us-west-1"
  PROJECT_NAME: "eks-cluster"
  # ===== END CUSTOMIZATION =====
  TERRAFORM_VERSION: "1.6.6"
  GO_VERSION: "1.21"
  TFLINT_VERSION: "v0.50.3"
  MIN_EKS_VERSION: "1.31"

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:
  #############################################################################
  # Stage 1: Static Analysis (parallel)
  #############################################################################
  terraform-fmt:
    name: Terraform Format
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Format Check
        run: task fmt

  terraform-validate:
    name: Terraform Validate
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Validate
        run: task validate-tf

  tflint:
    name: TFLint
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Run TFLint
        run: task tflint

  trivy:
    name: Trivy Security Scan
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy IaC scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM'
          trivyignores: .trivyignore

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  #############################################################################
  # Stage 2: Unit Tests
  #############################################################################

  tests-unit:
    name: Unit Tests
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest
    needs: [terraform-fmt, terraform-validate, tflint, trivy]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: test/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests
        run: task test-unit

  #############################################################################
  # Stage 3: Integration Tests
  # Go tests handle the full lifecycle: VPC deploy, version discovery,
  # parallel EKS deploys, validation, and all cleanup via defer.
  #############################################################################

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [tests-unit]
    if: |
      always()
      && (needs.tests-unit.result == 'success' || needs.tests-unit.result == 'skipped')
      && (
        contains(github.event.pull_request.labels.*.name, 'run-integration-tests')
        || (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/test-integration'))
      )
    timeout-minutes: 60
    env:
      PIPELINE_RUN_ID: "${{ github.run_id }}"
    steps:
      - name: React to comment
        if: github.event_name == 'issue_comment'
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=rocket
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve PR head SHA
        id: pr-sha
        if: github.event_name == 'issue_comment'
        run: |
          SHA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefOid -q .headRefOid)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set PR commit status (pending)
        if: steps.pr-sha.outputs.sha
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ steps.pr-sha.outputs.sha }}
          status: pending
          context: Integration Tests
          description: Integration tests running...

      - name: Checkout PR branch
        if: github.event_name == 'issue_comment'
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge

      - name: Checkout
        if: github.event_name != 'issue_comment'
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: terratest-integration-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: test/go.sum

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        run: task test-integration
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          MIN_EKS_VERSION: ${{ env.MIN_EKS_VERSION }}
          PROJECT_NAME: ${{ env.PROJECT_NAME }}

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_id }}
          path: test/*.log
          retention-days: 7

      - name: Set PR commit status (result)
        if: always() && steps.pr-sha.outputs.sha
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ steps.pr-sha.outputs.sha }}
          status: ${{ job.status }}
          context: Integration Tests

  #############################################################################
  # Stage 4: Fallback Cleanup (cloud-nuke safety net)
  #############################################################################

  cleanup-fallback:
    name: Cleanup AWS Resources (cloud-nuke)
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: always() && needs.integration-test.result != 'skipped'
    steps:
      - name: Resolve PR head SHA
        id: pr-sha
        if: github.event_name == 'issue_comment'
        run: |
          SHA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefOid -q .headRefOid)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set PR commit status (pending)
        if: steps.pr-sha.outputs.sha
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ steps.pr-sha.outputs.sha }}
          status: pending
          context: Cleanup (cloud-nuke)
          description: Cleanup running...

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: terratest-cleanup-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cleanup
        run: task cleanup-run
        env:
          PIPELINE_RUN_ID: "${{ github.run_id }}"
          CLOUD_NUKE_VERSION: v0.46.0
          DISABLE_TELEMETRY: "true"

      - name: Set PR commit status (result)
        if: always() && steps.pr-sha.outputs.sha
        uses: myrotvorets/set-commit-status-action@v2.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sha: ${{ steps.pr-sha.outputs.sha }}
          status: ${{ job.status }}
          context: Cleanup (cloud-nuke)

  #############################################################################
  # Summary job
  #############################################################################

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs:
      - terraform-fmt
      - terraform-validate
      - tflint
      - trivy
      - tests-unit
      - integration-test
      - cleanup-fallback
    if: always()
    steps:
      - name: Check all jobs
        run: |
          # Map results to emojis
          status_icon() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              skipped)   echo "⏭️" ;;
              cancelled) echo "🚫" ;;
              *)         echo "❓" ;;
            esac
          }

          FMT="${{ needs.terraform-fmt.result }}"
          VALIDATE="${{ needs.terraform-validate.result }}"
          TFLINT="${{ needs.tflint.result }}"
          TRIVY="${{ needs.trivy.result }}"
          UNIT="${{ needs.tests-unit.result }}"
          INTEGRATION="${{ needs.integration-test.result }}"
          CLEANUP="${{ needs.cleanup-fallback.result }}"

          # Add trigger context note
          EVENT="${{ github.event_name }}"
          {
            echo "## Pipeline Results"
            echo ""
            if [[ "$EVENT" == "issue_comment" ]]; then
              echo "> Triggered by \`/test-integration\` comment — static analysis and unit tests skipped"
              echo ""
            elif [[ "$EVENT" == "push" ]]; then
              echo "> Triggered by push to \`${{ github.ref_name }}\`"
              echo ""
            else
              echo "> Triggered by pull request"
              echo ""
            fi
            echo "| Stage | Job | Result |"
            echo "|-------|-----|--------|"
            echo "| Static Analysis | Terraform Format | $(status_icon $FMT) $FMT |"
            echo "| Static Analysis | Terraform Validate | $(status_icon $VALIDATE) $VALIDATE |"
            echo "| Static Analysis | TFLint | $(status_icon $TFLINT) $TFLINT |"
            echo "| Static Analysis | Trivy Security Scan | $(status_icon $TRIVY) $TRIVY |"
            echo "| Tests | Unit Tests | $(status_icon $UNIT) $UNIT |"
            echo "| Tests | Integration Tests | $(status_icon $INTEGRATION) $INTEGRATION |"
            echo "| Cleanup | cloud-nuke | $(status_icon $CLEANUP) $CLEANUP |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Fail if any required static analysis or unit test job failed (skipped is OK for comment triggers)
          if [[ "$FMT" == "failure" ]] || \
             [[ "$VALIDATE" == "failure" ]] || \
             [[ "$TFLINT" == "failure" ]] || \
             [[ "$TRIVY" == "failure" ]] || \
             [[ "$UNIT" == "failure" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> **❌ One or more required jobs failed**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # Fail if integration tests failed
          if [[ "$INTEGRATION" == "failure" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> **❌ Integration tests failed**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **✅ All required checks passed**" >> "$GITHUB_STEP_SUMMARY"
