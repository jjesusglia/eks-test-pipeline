version: '3'

# =============================================================================
# CUSTOMIZE THESE FOR YOUR PROJECT
# =============================================================================
vars:
  PROJECT_NAME: eks-cluster
  AWS_REGION: us-west-1
  # Paths for static analysis (terraform validate runs on each)
  VALIDATE_PATHS: "modules/eks-cluster examples/vpc examples/eks"

  # Go test configuration
  TEST_DIR: test
  INTEGRATION_TEST_TIMEOUT: 55m

  # Required tools (checked by 'task setup')
  REQUIRED_TOOLS: terraform go tflint trivy task jq pre-commit
  TFLINT_VERSION: v0.50.3

# Export Taskfile vars as environment variables for CI scripts and Go tests
env:
  PROJECT_NAME: "{{.PROJECT_NAME}}"
  AWS_REGION: "{{.AWS_REGION}}"
  TF_VAR_aws_region: "{{.AWS_REGION}}"
# =============================================================================

tasks:
  default:
    desc: "Show available tasks"
    cmds:
      - task --list

  ##############################################################################
  # Static Analysis Tasks
  ##############################################################################

  fmt:
    desc: "Fix Terraform formatting"
    internal: true
    cmds:
      - terraform fmt -recursive

  validate-tf:
    desc: "Validate Terraform configuration (use '-- <dir>' for a single directory)"
    internal: true
    cmds:
      - |
        if [ -n "{{.CLI_ARGS}}" ]; then
          terraform -chdir="{{.CLI_ARGS}}" init -input=false -backend=false
          terraform -chdir="{{.CLI_ARGS}}" validate
        else
          ./ci/validate.sh "{{.VALIDATE_PATHS}}"
        fi

  tflint-init:
    desc: "Initialize TFLint and download plugins"
    internal: true
    cmds:
      - tflint --init

  tflint:
    desc: "Run TFLint linter"
    internal: true
    deps:
      - tflint-init
    cmds:
      - tflint --recursive --format=compact

  security-scan:
    desc: "Run Trivy security scan (use '-- json' for JSON output to trivy-results.json)"
    cmds:
      - |
        if [ "{{.CLI_ARGS}}" = "json" ]; then
          trivy config . --format json --severity CRITICAL,HIGH,MEDIUM --output trivy-results.json --skip-dirs ".terraform" --skip-dirs "**/.terraform"
          echo "Results saved to trivy-results.json"
        else
          trivy config . --format table --severity CRITICAL,HIGH,MEDIUM --exit-code 1 --skip-dirs ".terraform" --skip-dirs "**/.terraform"
        fi

  lint:
    desc: "Run all linting and security checks"
    cmds:
      - task: fmt
      - task: validate-tf
      - task: tflint
      - task: security-scan

  ##############################################################################
  # Tests
  ##############################################################################

  test-unit:
    desc: "Run unit tests. Use '-- coverage' for coverage report"
    internal: true
    cmds:
      - |
        cd {{.TEST_DIR}}
        if [ "{{.CLI_ARGS}}" = "coverage" ]; then
          go test -v -cover -coverprofile=coverage.out ./unit/...
          go tool cover -html=coverage.out -o coverage.html
          echo "Coverage report: {{.TEST_DIR}}/coverage.html"
        else
          go test -v ./unit/...
        fi

  test-local:
    desc: "Run local tests (lint + unit)"
    cmds:
      - task: lint
      - task: test-unit

  test-integration:
    desc: "Run integration tests (Go tests handle full infra lifecycle)"
    summary: |
      Go tests deploy VPC, discover EKS versions, deploy parallel EKS clusters,
      validate, and destroy everything via defer. Only AWS credentials required.
      Override the test pattern: task test-integration -- TestEksClusterVersionMatrix
    cmds:
      - cd {{.TEST_DIR}} && go test -v {{if .CLI_ARGS}}-run {{.CLI_ARGS}}{{end}} -timeout {{.INTEGRATION_TEST_TIMEOUT}} ./integration/...

  test-all:
    desc: "Run everything: lint + unit + integration (deploys real AWS resources)"
    prompt: "This will deploy real AWS resources. Continue?"
    cmds:
      - task: test
      - task: test-integration

  ##############################################################################
  # Initialization Tasks
  ##############################################################################

  deps:
    desc: "Download Go dependencies"
    internal: true
    cmds:
      - cd {{.TEST_DIR}} && go mod download
      - cd {{.TEST_DIR}} && go mod tidy

  setup:
    desc: "Setup development environment"
    cmds:
      - task: version-check
      - task: validate-tf
      - task: deps
      - task: tflint-init
      - git config --unset-all core.hooksPath || true
      - pre-commit install
      - pre-commit install --hook-type pre-push

  ##############################################################################
  # Cleanup Tasks
  ##############################################################################

  clean:
    desc: "Deep clean (Terraform state + Go cache + .tflint cache)"
    cmds:
      - ./scripts/clean.sh --all

  cleanup-run:
    desc: "Clean orphaned resources from a specific run. Resolves from flags/env/.task metadata. Add '-- force' to delete."
    cmds:
      - ./ci/cleanup.sh run --region {{.AWS_REGION}} --project {{.PROJECT_NAME}} {{if eq .CLI_ARGS "force"}}--force{{end}}

  cleanup-project:
    desc: "Clean ALL resources for this project (any RunID). Add '-- force' to delete."
    cmds:
      - ./ci/cleanup.sh project --region {{.AWS_REGION}} --project {{.PROJECT_NAME}} {{if eq .CLI_ARGS "force"}}--force{{end}}

  ci:
    desc: "Run CI pipeline locally (like GitHub Actions)"
    cmds:
      - task: test

  ##############################################################################
  # Debug Tasks
  ##############################################################################

  debug-tf:
    desc: "Enable Terraform debug logging"
    cmds:
      - echo "export TF_LOG=DEBUG"
      - echo "export TF_LOG_PATH=/tmp/terraform.log"
      - echo "task test-integration"

  debug-go:
    desc: "Run tests with verbose Go logging"
    cmds:
      - echo "Running integration tests with -v flag..."
      - cd {{.TEST_DIR}} && go test -v -timeout 40m ./integration/...

  version-check:
    desc: "Check required tool versions"
    internal: true
    cmds:
      - |
        echo "Checking tool versions..."
        for name in {{.REQUIRED_TOOLS}}; do
          printf "  %-12s " "${name}:"
          if [ "$name" = "go" ]; then
            go version 2>&1 | head -1 || echo "not installed"
          else
            "$name" --version 2>&1 | head -1 || echo "not installed"
          fi
        done
